<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
    <style>
        body {
            background-color:lightslategrey;
            font-family: 'Times New Roman', Times, serif;
        }
        h1 {
            text-align: center;
        }
        form {
            width: 600px;
            margin: auto;
        }
        label {
            display: inline-block;
            width: 150px;
            margin-bottom: 10px;
        }
        input, textarea {
            margin-bottom: 10px;
            padding: 5px;
        }
        textarea {
            width: 370px;
            height: 100px;
        }
        .inline {
            width: auto;
        }
        select{
            width: 380px;
        }
    </style>
</head>
<body>

<h1 style="color: whitesmoke;">Student Registration Form</h1>

<form>
    <label>Roll no. :</label>
    <input type="text" size="48"><br>

    <label>Student name :</label>
    <input type="text" placeholder="First Name">
    -
    <input type="text" placeholder="Last Name"><br>

    <label>Father's name :</label>
    <input type="text" size="48"><br>

    <label>Date of birth :</label>
    <input type="text" placeholder="Day" size="4">
    -
    <input type="text" placeholder="Month" size="4">
    -
    <input type="text" placeholder="Year" size="6">
    <br>

    <label>Mobile no. :</label>
    <input type="text" value="+91" size="3">
    -
    <input type="text" size="37"><br>

    <label>Email id :</label>
    <input type="email" size="48"><br>

    <label>Password :</label>
    <input type="password" size="48"><br>

    <label>Gender :</label>
    <input type="radio" name="gender" class="inline"> Male
    <input type="radio" name="gender" class="inline"> Female<br>

    <label>Department :</label>
    <input type="checkbox" class="inline"> CSS
    <input type="checkbox" class="inline"> Frontend
    <input type="checkbox" class="inline"> Backend
    <input type="checkbox" class="inline"> HTML
    <input type="checkbox" class="inline"> JavaScript
    <input type="checkbox" class="inline"> Graphic Desigin<br>


    <label>Course :</label>
    <select>
        <option>---------------- Select Current Course's ----------------</option>
        <option>Graphic Desigin</option>
        <option>Python</option>
        <option>Basic Class</option>
        <option>Web Desigin</option>
        <option>HTML/Js</option>
    </select><br>

    <label>Student photo :</label>
    <input type="file"><br>

    <label>City :</label>
    <input type="text" size="48"><br>

    <label>Address :</label>
    <textarea></textarea><br>

    <div style="text-align:center;">
        <input type="submit" value="Register">
    </div>
</form>

</body>
</html>
